<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>四国本島 クマ出没ハザードマップ</title>
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header id="header">
    <h1>四国本島 クマ出没ハザードマップ</h1>
    <p>
      過去の出没地点と<strong>地形・土地利用が似た場所</strong>を類似度スコアで推定したヒートマップです。
      表示範囲は四国本島のみで、周辺島しょ部は含めません。出没データは少数のため、これは統計的な相対リスクの目安であり、
      スコアが低い場所の安全を保証するものではありません。
    </p>
  </header>
  <aside id="filters" aria-label="出没地点フィルタ">
    <label>
      季節
      <select id="season-filter">
        <option value="all">すべて</option>
        <option value="spring">春</option>
        <option value="summer">夏</option>
        <option value="autumn">秋</option>
        <option value="winter">冬</option>
      </select>
    </label>
    <label>
      月
      <select id="month-filter">
        <option value="all">すべて</option>
      </select>
    </label>
    <label class="toggle">
      <input id="food-season-filter" type="checkbox" />
      秋の採食期のみ
    </label>
    <div id="filter-count">出没地点: -</div>
  </aside>
  <div id="map"></div>
  <footer id="footer">
    出典: 国土数値情報（行政区域・河川・土地利用細分メッシュ）／国土地理院（標高タイル・地図タイル）を加工して作成。
    手法: presence-only 特徴空間類似度（マハラノビス距離 + Gaussianカーネル）。
  </footer>
  <script src="app.js"></script>
</body>
</html>
